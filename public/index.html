<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatTaskTracker</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f13;
      --panel:       #1a1a24;
      --card:        #22222f;
      --card-hover:  #2a2a3a;
      --border:      #2e2e40;
      --accent:      #7c6af7;
      --accent-dim:  #5a50c0;
      --green:       #4ade80;
      --red:         #f87171;
      --yellow:      #fbbf24;
      --text:        #e2e2f0;
      --text-dim:    #8080a0;
      --radius:      8px;
    }

    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Layout ────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 360px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      flex: 1;
    }

    header .tag {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--card);
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    /* ── Task panel (left) ─────────────────────────────────────── */
    .task-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .05em;
      flex: 1;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 99px;
      min-width: 20px;
      text-align: center;
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .task-card:hover { background: var(--card-hover); border-color: var(--accent); }
    .task-card.selected { border-color: var(--accent); }

    .task-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.pending { background: var(--yellow); }
    .status-dot.completed { background: var(--green); }

    .task-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .task-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
    }

    .task-title.completed-title {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .note-count {
      font-size: 11px;
      color: var(--accent);
      opacity: 0.8;
    }

    .btn-complete {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }

    .btn-complete:hover { border-color: var(--green); color: var(--green); }

    .status-label-done {
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
    }

    .task-details {
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: none;
    }

    .task-card.selected .task-details { display: block; }

    .detail-item {
      display: flex;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .detail-item:last-child { border-bottom: none; }

    .detail-bullet {
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .no-details {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      padding: 4px 0;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-dim);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    /* ── Chat panel (right) ────────────────────────────────────── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      gap: 4px;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .message-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .message.assistant .message-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .message-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .duplicate-badge {
      display: inline-block;
      font-size: 10px;
      background: var(--yellow);
      color: #000;
      padding: 1px 6px;
      border-radius: 99px;
      margin-left: 6px;
      font-weight: 600;
    }

    /* ── Chat input area ───────────────────────────────────────── */
    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--panel);
    }

    #messageInput {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }

    #messageInput:focus { border-color: var(--accent); }
    #messageInput::placeholder { color: var(--text-dim); }

    #sendBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
      align-self: flex-end;
    }

    #sendBtn:hover { background: var(--accent-dim); }
    #sendBtn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Loading indicator ─────────────────────────────────────── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
    }

    .typing-indicator.visible { display: flex; }

    .typing-dots {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      border-bottom-left-radius: 3px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Reset button ──────────────────────────────────────────── */
    #resetBtn {
      background: none;
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all .15s;
    }

    #resetBtn:hover { background: var(--red); color: #fff; }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    * { scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <h1>ChatTaskTracker</h1>
    <span class="tag">Gemini 2.0 Flash</span>
    <button id="resetBtn" title="Wipe all data and start fresh">Reset</button>
  </header>

  <!-- Left: Task list -->
  <aside class="task-panel">
    <div class="panel-header">
      <h2>Tasks</h2>
      <span class="badge" id="taskCount">0</span>
    </div>
    <div class="task-list" id="taskList">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>No tasks yet.<br/>Start chatting to create some!</p>
      </div>
    </div>
  </aside>

  <!-- Right: Chat -->
  <section class="chat-panel">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="message-bubble">
          👋 Hi! I'm your task assistant. Tell me what you need to get done and I'll create tasks for you.<br/><br/>
          Try: <em>"I need to fix the login bug, write the API docs, and deploy to staging"</em>
        </div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="messageInput"
        placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
        rows="1"
      ></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </section>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────
  let selectedTaskId = null;

  // ── DOM refs ───────────────────────────────────────────────────
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('messageInput');
  const sendBtn      = document.getElementById('sendBtn');
  const taskListEl   = document.getElementById('taskList');
  const taskCountEl  = document.getElementById('taskCount');
  const typingEl     = document.getElementById('typingIndicator');
  const resetBtn     = document.getElementById('resetBtn');

  // ── Task list ──────────────────────────────────────────────────
  async function fetchTasks() {
    try {
      const res  = await fetch('/api/tasks');
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (e) {
      console.error('Failed to fetch tasks', e);
    }
  }

  function renderTasks(tasks) {
    taskCountEl.textContent = tasks.length;

    if (tasks.length === 0) {
      taskListEl.innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>No tasks yet.<br/>Start chatting to create some!</p>
        </div>`;
      return;
    }

    taskListEl.innerHTML = tasks.map(task => {
      const isSelected = task.id === selectedTaskId;
      const isDone     = task.status === 'completed';

      const detailsHtml = isSelected
        ? (task.details.length > 0
            ? task.details.map(d => `
                <div class="detail-item">
                  <span class="detail-bullet">›</span>
                  <span>${escapeHtml(d.content)}</span>
                </div>`).join('')
            : '<p class="no-details">No notes attached yet.</p>')
        : '';

      const noteCount = task.details.length;
      const noteLabel = noteCount === 1 ? '1 note' : `${noteCount} notes`;

      return `
        <div class="task-card ${isSelected ? 'selected' : ''}"
             data-id="${task.id}"
             onclick="toggleTask('${task.id}')">
          <div class="task-card-header">
            <div class="status-dot ${task.status}"></div>
            <div class="task-card-body">
              <span class="task-title ${isDone ? 'completed-title' : ''}">${escapeHtml(task.title)}</span>
              ${noteCount > 0 ? `<span class="note-count">📎 ${noteLabel}</span>` : ''}
            </div>
            ${!isDone ? `<button class="btn-complete" onclick="completeTask(event,'${task.id}')">Mark complete</button>` : '<span class="status-label-done">✓ Completed</span>'}
          </div>
          ${isSelected ? `<div class="task-details">${detailsHtml}</div>` : ''}
        </div>`;
    }).join('');
  }

  function toggleTask(id) {
    selectedTaskId = selectedTaskId === id ? null : id;
    fetchTasks();
  }

  async function completeTask(event, id) {
    event.stopPropagation();
    try {
      await fetch(`/api/tasks/${id}/complete`, { method: 'PATCH' });
      await fetchTasks();
    } catch (e) {
      console.error('Failed to complete task', e);
    }
  }

  // ── Chat ───────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    typingEl.classList.add('visible');
    scrollToBottom();

    try {
      const res  = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();

      typingEl.classList.remove('visible');
      appendMessage('assistant', data.reply, data.duplicate);

      // Auto-expand the last task that was touched (note attached, completed, or created)
      if (data.affectedTaskIds && data.affectedTaskIds.length > 0) {
        selectedTaskId = data.affectedTaskIds[data.affectedTaskIds.length - 1];
      }

      await fetchTasks(); // refresh task list after any change
    } catch (e) {
      typingEl.classList.remove('visible');
      appendMessage('assistant', '⚠️ Error: could not reach the server.');
      console.error(e);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
      scrollToBottom();
    }
  }

  function appendMessage(role, text, isDuplicate = false) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const dupBadge = isDuplicate
      ? '<span class="duplicate-badge">idempotent replay</span>'
      : '';

    div.innerHTML = `
      <div class="message-bubble">${escapeHtml(text)}</div>
      <div class="message-meta">${role === 'user' ? 'You' : 'Assistant'}${dupBadge}</div>`;

    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Reset ──────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    if (!confirm('Reset all tasks, details, and chat history? This cannot be undone.')) return;
    await fetch('/admin/reset', { method: 'POST' });
    selectedTaskId = null;
    await fetchTasks();
    messagesEl.innerHTML = `
      <div class="message assistant">
        <div class="message-bubble">🔄 System reset. All data cleared. Ready for a fresh start!</div>
      </div>`;
  });

  // ── Input helpers ──────────────────────────────────────────────
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Utility ────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Init ───────────────────────────────────────────────────────
  fetchTasks();
</script>
</body>
</html>
